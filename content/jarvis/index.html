---
<style>
    #jarvis-app {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--font-color);
      overflow-x: hidden;
    }

    #jarvis-app canvas {
      margin-top: 10px;
      background-color: var(--bg-color);
      width: 100%;
      max-width: 800px;
      height: auto;
      touch-action: none;
    }

    #jarvis-app input[type="file"] {
      margin: 10px 0;
      padding: 10px;
      background-color: var(--bg-color);
      color: var(--font-color);
      border-radius: 4px;
      border: 1px solid var(--table-border-color);
      width: 100%;
      max-width: 300px;
    }

    #jarvis-app h1 {
      color: var(--font-color);
      font-size: 1.5rem;
      margin: 10px 0;
    }

    #jarvis-app p {
      margin: 5px 0;
    }

    #jarvis-app .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: 10px 0;
      width: 100%;
      max-width: 800px;
    }

    #jarvis-app button {
      padding: 12px 20px;
      background-color: var(--bg-color);
      color: var(--font-color);
      border: 1px solid var(--table-border-color);
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      min-width: 80px;
      text-align: center;
    }

    #jarvis-app button:hover {
      color: var(--link-state-color);
    }

    #jarvis-app button:active {
      border-color: var(--link-state-color);
    }

    #jarvis-app #pause-btn {
      background-color: var(--bg-color);
    }

    #jarvis-app #pause-btn.paused {
      color: var(--link-state-color);
    }

    #jarvis-app .mobile-hint {
      margin-top: 10px;
      color: var(--post-info-color);
      font-size: 0.8rem;
      text-align: center;
    }

    #jarvis-app .progress-container {
      width: 100%;
      max-width: 800px;
      margin: 10px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #jarvis-app .slider {
      width: 100%;
      height: 10px;
      -webkit-appearance: none;
      background: linear-gradient(to right, var(--link-color) 0%, var(--link-color) 0%, var(--hr-color) 0%);
      outline: none;
      border-radius: 5px;
      margin: 10px 0;
    }

    #jarvis-app .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--font-color);
      cursor: pointer;
    }

    #jarvis-app .slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--font-color);
      cursor: pointer;
    }

    #jarvis-app .slider:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #jarvis-app .time-display {
      color: var(--font-color);
      font-size: 0.8rem;
      margin-top: 5px;
    }
</style>

<div id="jarvis-app">
  <h1>(jar)bus audio (vis)ualizer</h1>
  <p>built with webGPU, runs locally.</p>
  <div class="controls">
    <input type="file" id="file-input" accept="audio/*,.mp3,.m4a,.wav,.aac" />
    <button id="pause-btn">Pause</button>
  </div>
  <canvas id="gpu-canvas" width="800" height="400"></canvas>

  <div class="progress-container">
    <input type="range" id="seek-slider" min="0" max="100" value="0" step="0.1" class="slider" disabled>
    <div class="time-display">
      <span id="current-time">0:00</span> / <span id="duration">0:00</span>
    </div>
  </div>
  <script type="module" src="./index.js"></script>
</div>
