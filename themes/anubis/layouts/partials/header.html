<div class="header-top">
    {{ partial "site-title.html" . }}
</div>

<img class="theme-image theme-image-dark" src="/dithered-tree-contrast.gif" alt="Dithered Tree">
<img class="theme-image theme-image-light" src="/bonsai2.png" alt="Bonsai Tree">
{{ if .Site.Menus.main }}
    <nav>
        {{ $currentPage := . }}
        {{ range sort .Site.Menus.main "Weight" }}
        <a class="{{if or ($currentPage.IsMenuCurrent "main" .) ($currentPage.HasMenuCurrent "main" .) }} active{{end}}" href="{{ .URL | absLangURL }}" title="{{ .Title }}">{{ .Name }}</a>
        {{ end }}
    </nav>
{{ else }}
    <nav></nav>
{{ end }}

{{ if .Site.Params.mathjax }}{{ partial "mathjax_support.html" . }}{{ end }}

{{ partial "header-extra.html" . }}
